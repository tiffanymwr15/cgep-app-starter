name: grc-gate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  TF_WORKING_DIR: terraform
  EVIDENCE_DIR: evidence

jobs:
  # Steps 1–2 on PRs: Plan + Policy check (fail closed; no apply).
  plan-and-policy:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Detection unit tests
        run: |
          python -m pip install --quiet pytest
          pytest monitoring/tests -v

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6
          terraform_wrapper: false

      - name: Install Conftest
        run: |
          curl -fsSL https://github.com/open-policy-agent/conftest/releases/download/v0.50.0/conftest_0.50.0_Linux_x86_64.tar.gz \
            | tar -xz -C /usr/local/bin conftest

      - name: "1. Plan"
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform init -input=false
          terraform validate
          terraform plan -out=tfplan -no-color | tee plan.txt
          terraform show -json tfplan > plan.json

      - name: "2. Policy check"
        run: |
          mkdir -p "${{ env.EVIDENCE_DIR }}"
          cp "${{ env.TF_WORKING_DIR }}/plan.json" "${{ env.EVIDENCE_DIR }}/plan.json"
          cp "${{ env.TF_WORKING_DIR }}/plan.txt" "${{ env.EVIDENCE_DIR }}/plan.txt"
          bash scripts/policy-gate.sh "${{ env.TF_WORKING_DIR }}/plan.json"

      - name: Upload PR evidence artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: grc-evidence-pr-${{ github.run_id }}
          path: ${{ env.EVIDENCE_DIR }}/
          retention-days: 14

  # Steps 1–5 on merge to main: Plan → Policy → Apply → Sign → Upload.
  plan-apply-sign-upload:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Detection unit tests
        run: |
          python -m pip install --quiet pytest
          pytest monitoring/tests -v

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6
          terraform_wrapper: false

      - name: Install Conftest
        run: |
          curl -fsSL https://github.com/open-policy-agent/conftest/releases/download/v0.50.0/conftest_0.50.0_Linux_x86_64.tar.gz \
            | tar -xz -C /usr/local/bin conftest

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: 'v2.2.4'

      - name: "1. Plan"
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform init -input=false
          terraform validate
          terraform plan -out=tfplan -no-color | tee plan.txt
          terraform show -json tfplan > plan.json

      - name: "2. Policy check"
        run: |
          mkdir -p "${{ env.EVIDENCE_DIR }}"
          cp "${{ env.TF_WORKING_DIR }}/plan.json" "${{ env.EVIDENCE_DIR }}/plan.json"
          cp "${{ env.TF_WORKING_DIR }}/plan.txt" "${{ env.EVIDENCE_DIR }}/plan.txt"
          bash scripts/policy-gate.sh "${{ env.TF_WORKING_DIR }}/plan.json"

      - name: "3. Apply"
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform apply -auto-approve tfplan

      - name: "4. Sign + 5. Upload to vault"
        env:
          VAULT: ${{ vars.EVIDENCE_VAULT }}
          RUN_ID: ${{ github.run_id }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          BUNDLE="evidence-${RUN_ID}-${SHA}.tar.gz"
          tar czf "${BUNDLE}" -C "${{ env.EVIDENCE_DIR }}" .
          sha256sum "${BUNDLE}" | awk '{print $1}' > "${BUNDLE}.sha256"

          cosign sign-blob --yes --bundle "${BUNDLE}.sig.bundle" "${BUNDLE}"

          KEY_PREFIX="runs/${RUN_ID}"
          aws s3 cp "${BUNDLE}"            "s3://${VAULT}/${KEY_PREFIX}/${BUNDLE}"
          aws s3 cp "${BUNDLE}.sha256"     "s3://${VAULT}/${KEY_PREFIX}/${BUNDLE}.sha256"
          aws s3 cp "${BUNDLE}.sig.bundle" "s3://${VAULT}/${KEY_PREFIX}/${BUNDLE}.sig.bundle"

          VERSION_ID=$(aws s3api head-object --bucket "${VAULT}" --key "${KEY_PREFIX}/${BUNDLE}" --query VersionId --output text)
          cat > receipt.json <<EOF
          {
            "run_id":"${RUN_ID}",
            "vault":"${VAULT}",
            "bundle_key":"${KEY_PREFIX}/${BUNDLE}",
            "version_id":"${VERSION_ID}",
            "sha256":"$(cat ${BUNDLE}.sha256)",
            "commit":"${SHA}"
          }
          EOF
          aws s3 cp receipt.json "s3://${VAULT}/${KEY_PREFIX}/receipt.json"

      - name: Upload evidence artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: grc-evidence-${{ github.run_id }}
          path: ${{ env.EVIDENCE_DIR }}/
          retention-days: 90
